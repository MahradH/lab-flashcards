    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #f0fdfa;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, 'Roya', 'Yekan', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px 15px; /* کاهش پدینگ برای جا شدن بهتر در موبایل */
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 350px;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        .lesson-selector {
            width: 100%;
            padding: 8px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background-color: white;
            font-size: 1rem;
            font-weight: bold;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .lesson-selector:focus {
            border-color: var(--primary-color);
        }

        .hint-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .flashcard-container {
            width: 100%;
            max-width: 350px;
            height: 200px; /* کاهش ارتفاع کارت */
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .flashcard-front {
            transform: rotateY(0deg);
        }

        .flashcard-front .word {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary-color);
            direction: ltr;
        }

        /* استایل مربوط به تلفظ کلمه */
        .flashcard-front .pronunciation {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: normal;
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background-color: var(--primary-color);
            color: white;
            border: none;
        }

        .flashcard-back .meaning {
            font-size: 1.6rem;
            font-weight: bold;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 350px;
        }

        button {
            flex: 1;
            padding: 10px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            background-color: white;
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress {
            margin-top: 15px;
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: bold;
            background: #e2e8f0;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .footer {
            margin-top: auto;
            padding-top: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
            padding-bottom: 10px;
        }

        .footer span.heart {
            color: #e11d48;
            font-size: 1rem;
        }

        .footer strong {
            color: var(--primary-color);
            font-size: 0.95rem;
        }

        .footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

        let currentLessonKey = "lesson1";
        let currentIndex = 0;
        let isFlipped = false;

        const flashcard = document.getElementById('flashcard');
        const enWordEl = document.getElementById('en-word');
        const faPronEl = document.getElementById('fa-pron');
        const faMeaningEl = document.getElementById('fa-meaning');
        const progressEl = document.getElementById('progress');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const lessonSelect = document.getElementById('lessonSelect');

        function initApp() {
            for (let key in lessonsData) {
                let option = document.createElement("option");
                option.value = key;
                option.text = lessonsData[key].title;
                lessonSelect.appendChild(option);
            }

            const savedLesson = localStorage.getItem("mahrad_saved_lesson");
            const savedIndex = localStorage.getItem("mahrad_saved_index");

            if (savedLesson && lessonsData[savedLesson]) {
                currentLessonKey = savedLesson;
                lessonSelect.value = savedLesson;
            }
            if (savedIndex) {
                currentIndex = parseInt(savedIndex);
            }

            if (currentIndex >= lessonsData[currentLessonKey].words.length) {
                currentIndex = 0;
            }

            updateCard();
        }

        function saveProgress() {
            localStorage.setItem("mahrad_saved_lesson", currentLessonKey);
            localStorage.setItem("mahrad_saved_index", currentIndex);
        }

        function changeLesson() {
            currentLessonKey = lessonSelect.value;
            currentIndex = 0;
            
            if (isFlipped) {
                flipCard();
                setTimeout(() => { updateCard(); }, 300);
            } else {
                updateCard();
            }
        }

        function updateCard() {
            const currentWords = lessonsData[currentLessonKey].words;
            const wordData = currentWords[currentIndex];

            if (!wordData) {
                enWordEl.textContent = "خالی";
                faPronEl.textContent = "";
                faMeaningEl.textContent = "کلمه‌ای اضافه نشده";
                return;
            }

            enWordEl.textContent = wordData.en;
            faPronEl.textContent = wordData.pron || "";
            faMeaningEl.textContent = wordData.fa;
            
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === currentWords.length - 1);
            
            progressEl.textContent = `کلمه ${currentIndex + 1} از ${currentWords.length}`;

            saveProgress();
        }

        function flipCard() {
            isFlipped = !isFlipped;
            if (isFlipped) {
                flashcard.classList.add('is-flipped');
            } else {
                flashcard.classList.remove('is-flipped');
            }
        }

        function nextWord() {
            const currentWords = lessonsData[currentLessonKey].words;
            if (currentIndex < currentWords.length - 1) {
                if (isFlipped) {
                    flipCard();
                    setTimeout(() => {
                        currentIndex++;
                        updateCard();
                    }, 300);
                } else {
                    currentIndex++;
                    updateCard();
                }
            }
        }

        function prevWord() {
            if (currentIndex > 0) {
                if (isFlipped) {
                    flipCard();
                    setTimeout(() => {
                        currentIndex--;
                        updateCard();
                    }, 300);
                } else {
                    currentIndex--;
                    updateCard();
                }
            }
        }

        let touchstartX = 0;
        let touchendX = 0;
        
        document.getElementById('cardContainer').addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });

        document.getElementById('cardContainer').addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchendX < touchstartX - 40) nextWord();
            if (touchendX > touchstartX + 40) prevWord();
        }

        initApp();
    </script>
