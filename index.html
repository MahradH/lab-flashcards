<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرور کلمات زبان عمومی ۱</title>
    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0, 0, 0, 0.06);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --accent-hard: #ef4444;
            --accent-easy: #10b981;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 380px;
            margin-bottom: 10px;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px var(--shadow-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 380px;
        }

        .header h1 {
            margin: 0 0 12px 0;
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 800;
        }

        .selectors-grid {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 8px;
        }

        .custom-select {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background-color: var(--card-bg);
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
        }

        .custom-select:focus {
            border-color: var(--primary-color);
        }

        .hint-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 8px;
            margin-bottom: 5px;
        }

        .flashcard-container {
            width: 100%;
            max-width: 380px;
            height: 230px;
            perspective: 1000px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 24px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .flashcard-front {
            transform: rotateY(0deg);
        }

        .flashcard-front .word {
            font-size: 2.4rem;
            font-weight: bold;
            color: var(--primary-color);
            direction: ltr;
        }

        .flashcard-front .pronunciation {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: normal;
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background-color: var(--primary-color);
            color: white;
            border: none;
        }

        .flashcard-back .meaning {
            font-size: 1.7rem;
            font-weight: bold;
            line-height: 1.5;
        }

        /* دکمه بوکمارک و تگ سختی روی کارت */
        .card-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
        .badge-hard { background-color: var(--accent-hard); }
        .badge-easy { background-color: var(--accent-easy); }

        .bookmark-btn {
            position: absolute;
            top: 12px;
            left: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
        }
        .bookmark-btn svg {
            width: 26px;
            height: 26px;
            fill: #cbd5e1;
            transition: fill 0.2s, transform 0.2s;
        }
        .bookmark-btn.is-active svg {
            fill: #ef4444;
        }
        .bookmark-btn:active svg {
            transform: scale(1.2);
        }

        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 380px;
        }

        button.nav-btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px var(--shadow-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.nav-btn:active {
            transform: scale(0.97);
        }

        button.nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: bold;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 18px;
            border-radius: 20px;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .footer {
            margin-top: auto;
            padding-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.6;
            padding-bottom: 10px;
            width: 100%;
            max-width: 380px;
        }

        .footer span.heart {
            color: #e11d48;
            font-size: 1rem;
        }

        .footer strong {
            color: var(--primary-color);
            font-size: 0.95rem;
        }

        .footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

                    { d_en: "shifts", pron: "شیفتس", fa: "تغییر / سوق دادن / منتقل کردن", difficulty: "hard" },
                    { en: "remainder", pron: "ریمیندر", Earth: "باقیمانده / بقیه", difficulty: "hard" },

                    { en: "prenatal", pron: "پرینیتال", fa: "پیش از زایمان", difficulty: "hard" },
                    { en: "neonatal", pron: "نیونیتال", fa: "نوزادی", difficulty: "hard" },
                    { en: "dehydrated", pron: "دیهایدریتِد", fa: "کم آب شده", difficulty: "hard" },
                    { en: "overweight", pron: "اووِروِیت", fa: "اضافه وزن", difficulty: "hard" },
                    { en: "hypertension", pron: "هایپرتنشن", fa: "افزایش فشار خون", difficulty: "hard" },
                    { en: "overactive", pron: "اووراکتیو", fa: "بیش فعال", difficulty: "hard" },

                    { en: "thereby", pron: "ذِربای", fa: "درنتیجه / به موجب آن / بنابراین", difficulty: "hard" },
                    { en: "infection", pron: "اینفکشن", fa: "عفونت", difficulty: "hard" },
                    { en: "compensate", pron: "کامپِنسِیت", fa: "جبران کردن / غرامت دادن", difficulty: "hard" },
                    { en: "deficiency", pron: "دیفیشنسی", fa: "نقص / فقدان", difficulty: "hard" },
                    { en: "announce", pron: "اَنانس", fa: "اعلام کردن", difficulty: "hard" },
                    { en: "breakthrough", pron: "بریک‌ثرو", fa: "پیشرفت / کشف مهم", difficulty: "hard" },
                    { en: "encourage", pron: "اینکاریج", fa: "تشویق کردن / ترغیب کردن", difficulty: "hard" },
                    { en: "development", pron: "دیولوپمنت", fa: "توسعه / رشد", difficulty: "hard" },
                    { en: "occurrence", pron: "آکارِنس", fa: "پیشامد / رویداد / واقعه", difficulty: "hard" }
                ]
            }
        };

        // متغیرهای وضعیت برنامه
        let currentLessonKey = "";
        let filteredWords = [];
        let currentIndex = 0;
        let isFlipped = false;
        let bookmarks = [];

        // المان‌های DOM
        const flashcard = document.getElementById('flashcard');
        const enWordEl = document.getElementById('en-word');
        const faPronEl = document.getElementById('fa-pron');
        const faMeaningEl = document.getElementById('fa-meaning');
        const progressEl = document.getElementById('progress');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const lessonSelect = document.getElementById('lessonSelect');
        const filterSelect = document.getElementById('filterSelect');
        const difficultyBadge = document.getElementById('difficultyBadge');
        const bookmarkBtn = document.getElementById('bookmarkBtn');
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        // تابع راه‌اندازی اولیه
        function initApp() {
            // ۱. بارگذاری بوکمارک‌ها از لوکال استوریج
            bookmarks = JSON.parse(localStorage.getItem("mahrad_bookmarks")) || [];

            // ۲. بارگذاری تم ذخیره شده
            const savedTheme = localStorage.getItem("mahrad_theme") || "light";
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcons(savedTheme);

            // ۳. پر کردن لیست آبشار درس‌ها به صورت پویا
            lessonSelect.innerHTML = "";
            for (let key in lessonsData) {
                let option = document.createElement("option");
                option.value = key;
                option.text = lessonsData[key].title;
                lessonSelect.appendChild(option);
            }

            // ۴. لود کردن آخرین درس و کلمه مرور شده
            const savedLesson = localStorage.getItem("mahrad_saved_lesson");
            const savedIndex = localStorage.getItem("mahrad_saved_index");

            if (savedLesson && lessonsData[savedLesson]) {
                currentLessonKey = savedLesson;
                lessonSelect.value = savedLesson;
            } else {
                // اگر چیزی نبود، اولین کلید موجود در دیتا را انتخاب کن
                currentLessonKey = Object.keys(lessonsData)[0] || "";
                lessonSelect.value = currentLessonKey;
            }

            if (savedIndex) {
                currentIndex = parseInt(savedIndex);
            }

            // ۵. اعمال فیلتر و بروزرسانی کارت
            applyFiltering(false); 
        }

        // تابع فیلتر کردن کلمات بر اساس درس و نوع فیلتر (آسان/سخت/بوکمارک)
        function applyFiltering(resetIndex = true) {
            if (!currentLessonKey) return;
            
            const allWordsInLesson = lessonsData[currentLessonKey].words || [];
            const activeFilter = filterSelect.value;

            filteredWords = allWordsInLesson.filter(word => {
                const isBookmarked = bookmarks.includes(`${currentLessonKey}_${word.en}`);
                if (activeFilter === "hard") return word.difficulty === "hard";
                if (activeFilter === "easy") return word.difficulty === "easy";
                if (activeFilter === "bookmarked") return isBookmarked;
                return true; // برای حالت "all"
            });

            if (resetIndex || currentIndex >= filteredWords.length) {
                currentIndex = 0;
            }

            updateCard();
        }

        // تغییر فیلترها توسط کاربر
        function handleFilterChange() {
            currentLessonKey = lessonSelect.value;
            
            if (isFlipped) {
                flipCard();
                setTimeout(() => { applyFiltering(true); }, 250);
            } else {
                applyFiltering(true);
            }
        }

        // بروزرسانی محتوای کارت گرافیکی
        function updateCard() {
            const wordData = filteredWords[currentIndex];

            // مدیریت وضعیت لیست خالی در فیلتر انتخابی
            if (!wordData) {
                enWordEl.textContent = "!خالی";
                faPronEl.textContent = "";
                faMeaningEl.textContent = "کلمه‌ای در این بخش پیدا نشد.";
                difficultyBadge.style.display = "none";
                bookmarkBtn.style.display = "none";
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                progressEl.textContent = "۰ از ۰";
                return;
            }

            // نمایش مجدد المان‌های پنهان شده
            bookmarkBtn.style.display = "flex";
            difficultyBadge.style.display = "block";

            // پر کردن اطلاعات کلمه
            enWordEl.textContent = wordData.en;
            faPronEl.textContent = wordData.pron || "";
            faMeaningEl.textContent = wordData.fa;

            // تنظیم وضعیت تگ سختی کلمه
            if (wordData.difficulty === "hard") {
                difficultyBadge.textContent = "سخت 🔥";
                difficultyBadge.className = "card-badge badge-hard";
            } else {
                difficultyBadge.textContent = "آسان ✨";
                difficultyBadge.className = "card-badge badge-easy";
            }

            // تنظیم وضعیت دکمه بوکمارک (قلب)
            const isBookmarked = bookmarks.includes(`${currentLessonKey}_${wordData.en}`);
            if (isBookmarked) {
                bookmarkBtn.classList.add('is-active');
            } else {
                bookmarkBtn.classList.remove('is-active');
            }
            
            // مدیریت دکمه‌های ناوبری
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === filteredWords.length - 1);
            
            // نمایش پیشرفت
            progressEl.textContent = `کلمه ${currentIndex + 1} از ${filteredWords.length}`;

            // ذخیره وضعیت پیشرفت در مرورگر
            localStorage.setItem("mahrad_saved_lesson", currentLessonKey);
            localStorage.setItem("mahrad_saved_index", currentIndex);
        }

        // لایک یا بوکمارک کردن کلمه
        function toggleBookmark(event) {
            event.stopPropagation(); // جلوگیری از چرخش کارت زمان کلیک بر روی قلب
            const wordData = filteredWords[currentIndex];
            if (!wordData) return;

            const bookmarkKey = `${currentLessonKey}_${wordData.en}`;
            const index = bookmarks.indexOf(bookmarkKey);

            if (index > -1) {
                bookmarks.splice(index, 1); // حذف از بوکمارک
                bookmarkBtn.classList.remove('is-active');
            } else {
                bookmarks.push(bookmarkKey); // اضافه کردن به بوکمارک
                bookmarkBtn.classList.add('is-active');
            }

            localStorage.setItem("mahrad_bookmarks", JSON.stringify(bookmarks));

            // اگر کاربر در تب "نشان شده‌ها" بود و لایک را برداشت، لیست مجددا ارزیابی شود
            if (filterSelect.value === "bookmarked") {
                setTimeout(() => { applyFiltering(false); }, 300);
            }
        }

        // چرخش کارت
        function flipCard() {
            if (filteredWords.length === 0) return; // کارت خالی نچرخد
            isFlipped = !isFlipped;
            flashcard.classList.toggle('is-flipped', isFlipped);
        }

        // کلمه بعدی
        function nextWord() {
            if (currentIndex < filteredWords.length - 1) {
                changeWordWithAnimation(() => { currentIndex++; });
            }
        }

        // کلمه قبلی
        function prevWord() {
            if (currentIndex > 0) {
                changeWordWithAnimation(() => { currentIndex--; });
            }
        }

        // انیمیشن نرم بازگشت کارت در صورت چرخیده بودن هنگام حرکت بین کلمات
        function changeWordWithAnimation(indexChangeCallback) {
            if (isFlipped) {
                flipCard();
                setTimeout(() => {
                    indexChangeCallback();
                    updateCard();
                }, 250);
            } else {
                indexChangeCallback();
                updateCard();
            }
        }

        // مدیریت تم تاریک/روشن
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem("mahrad_theme", newTheme);
            updateThemeIcons(newTheme);
        }

        function updateThemeIcons(theme) {
            if (theme === 'dark') {
                sunIcon.style.display = "block";
                moonIcon.style.display = "none";
            } else {
                sunIcon.style.display = "none";
                moonIcon.style.display = "block";
            }
        }

        // سیستم تشخیص سوایپ لمسی (Swipe) در موبایل
        let touchstartX = 0;
        let touchendX = 0;
        
        document.getElementById('cardContainer').addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, {passive: true});

        document.getElementById('cardContainer').addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            if (touchendX < touchstartX - 50) nextWord(); // سوایپ به چپ -> بعدی
            if (touchendX > touchstartX + 50) prevWord(); // سوایپ به راست -> قبلی
        }

        // اجرای اولیه نرم‌افزار
        initApp();
    </script>
